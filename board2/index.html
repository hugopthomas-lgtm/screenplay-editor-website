<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene Board — Kanban</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1a1a1a;--col-bg:#242424;--border:#333;
    --text:#e8e8e8;--text2:#999;--text3:#666;
    --accent:#9D7BEA;--accent-hover:#8B6AD4;--accent-soft:rgba(157,123,234,.1);
    --yellow:#FFF9DB;--pink:#FFE4E8;--blue:#DBEAFE;--green:#DCFCE7;
    --purple:#EDE9FE;--orange:#FFEDD5;--white:#FFFFFF;--gray:#F3F4F6;
    --drop:#9D7BEA;
  }
  html,body{height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text)}

  /* ── Header ── */
  .header{height:52px;display:flex;align-items:center;gap:12px;padding:0 20px;background:rgba(26,26,26,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
  .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#9D7BEA,#7C5DC4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;letter-spacing:-.5px}
  .project-title{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;border:none;background:none;color:var(--text);outline:none;min-width:100px;padding:4px 8px;border-radius:6px}
  .project-title:hover{background:var(--accent-soft)}
  .project-title:focus{background:var(--accent-soft);box-shadow:0 0 0 2px var(--accent)}
  .header-spacer{flex:1}
  .header-btn{height:34px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
  .header-btn:hover{border-color:var(--accent);color:var(--accent)}
  .header-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .header-btn.primary:hover{background:var(--accent-hover)}
  .header-btn svg{width:16px;height:16px}
  input[type=file]{display:none}

  /* ── Board ── */
  .board{display:flex;gap:16px;padding:16px;height:calc(100% - 52px);overflow-x:auto;overflow-y:hidden;align-items:flex-start;background-image:linear-gradient(rgba(157,123,234,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(157,123,234,.03) 1px,transparent 1px);background-size:60px 60px}

  /* ── Column ── */
  .column{min-width:280px;max-width:320px;width:280px;background:var(--col-bg);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:100%;flex-shrink:0}
  .col-header{display:flex;align-items:center;padding:12px 14px;gap:8px;border-bottom:1px solid var(--border)}
  .col-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;flex:1;border:none;background:none;color:var(--text);outline:none;padding:2px 6px;border-radius:4px;cursor:default}
  .col-title:focus{background:var(--accent-soft);cursor:text;box-shadow:0 0 0 2px var(--accent)}
  .col-count{font-size:11px;color:var(--text3);font-weight:500;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:10px}
  .col-delete{width:24px;height:24px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:opacity .15s}
  .col-header:hover .col-delete{opacity:1}
  .col-delete:hover{color:#EF4444;background:rgba(239,68,68,.15)}
  .col-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
  .col-cards::-webkit-scrollbar{width:4px}
  .col-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .col-add{padding:8px;border-top:1px solid var(--border)}
  .col-add-btn{width:100%;padding:8px;border:1px dashed var(--border);border-radius:8px;background:none;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s}
  .col-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* ── Add Column ── */
  .add-column{min-width:280px;width:280px;flex-shrink:0}
  .add-col-btn{width:100%;padding:14px;border:2px dashed var(--border);border-radius:12px;background:none;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
  .add-col-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* ── Card ── */
  .card{background:var(--yellow);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.5;cursor:default;user-select:none;position:relative;border:1px solid rgba(0,0,0,.06);transition:box-shadow .2s,transform .2s;word-break:break-word;min-height:36px;color:#2D2A3E;overflow:hidden}
  .card-grip{position:absolute;top:4px;left:6px;cursor:grab;color:rgba(0,0,0,.15);font-size:14px;line-height:1;user-select:none;opacity:0;transition:opacity .15s}
  .card:hover .card-grip{opacity:1}
  .card-grip:active{cursor:grabbing}
  .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .card.dragging{opacity:.4}
  .card.drag-clone{box-shadow:0 12px 32px rgba(0,0,0,.5);transform:scale(1.02);cursor:grabbing;position:fixed;z-index:9999;pointer-events:none;transition:none}
  .card-delete{position:absolute;top:4px;right:6px;width:20px;height:20px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);cursor:pointer;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
  .card:hover .card-delete{opacity:1}
  .card-delete:hover{background:rgba(239,68,68,.3);color:#EF4444}
  .card[contenteditable=true]{cursor:text;outline:none;box-shadow:0 0 0 2px var(--accent)}
  .card-text{pointer-events:none;white-space:pre-wrap}
  .card[contenteditable=true] .card-text{pointer-events:auto}

  /* ── Card heading + body ── */
  .card .time-dot{position:absolute;top:8px;right:8px}
  .card-location{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:rgba(45,42,62,.4);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board-legend{display:flex;align-items:center;gap:16px;padding:6px 20px;font-size:11px;color:#9CA3AF;border-bottom:1px solid rgba(0,0,0,.06);background:rgba(0,0,0,.01);flex-shrink:0}
  .board-legend .legend-group{display:flex;align-items:center;gap:4px}
  .board-legend .legend-swatch{width:10px;height:10px;border-radius:3px;border:1px solid rgba(0,0,0,.08)}
  .board-legend .legend-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
  .card-toggle{display:none}
  .card-expand-label{display:inline-block;margin-top:5px;font-size:10px;font-weight:500;color:rgba(45,42,62,.45);cursor:pointer;user-select:none;pointer-events:auto}
  .card-expand-label:hover{color:rgba(45,42,62,.7)}
  .card-expand-label::before{content:'▸ '}
  .card-toggle:checked ~ .card-expand-label::before{content:'▾ '}
  .card-body{font-size:11px;color:rgba(45,42,62,.55);margin-top:6px;line-height:1.5;white-space:pre-wrap;max-height:0;overflow:hidden;transition:max-height .25s ease;pointer-events:auto}
  .card-toggle:checked ~ .card-body{max-height:300px}

  /* ── Time of day indicator ── */
  .time-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
  .time-dot.jour{background:#FBBF24}
  .time-dot.nuit{background:#3B82F6}
  .time-dot.soir{background:#F97316}
  .time-dot.matin{background:#93C5FD}
  .time-dot.aube{background:#FDA4AF}
  .time-dot.unknown{background:#D1D5DB}

  /* ── Drop Placeholder ── */
  .drop-placeholder{height:4px;border-radius:4px;background:var(--accent);margin:2px 0;transition:height .1s;flex-shrink:0}

  /* ── Color Menu ── */
  .color-menu{position:fixed;z-index:10000;background:#2a2a2a;border-radius:10px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--border)}
  .color-swatch{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform .1s}
  .color-swatch:hover{transform:scale(1.15)}
  .color-swatch.active{border-color:var(--accent)}

  /* ── Toast ── */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12px;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  /* ── Light mode ── */
  body.light-mode{
    --bg:#F8F8FC;--col-bg:#FFFFFF;--border:#E2E2E8;
    --text:#2D2A3E;--text2:#6E6B7B;--text3:#9997A3;
    --accent:#9D7BEA;--accent-hover:#8B6AD4;--accent-soft:rgba(157,123,234,.08);
    --yellow:#FFF9DB;--pink:#FFE4E8;--blue:#DBEAFE;--green:#DCFCE7;
    --purple:#EDE9FE;--orange:#FFEDD5;--white:#FFFFFF;--gray:#F3F4F6;
  }
  body.light-mode{background:var(--bg);color:var(--text)}
  body.light-mode .header{background:rgba(255,255,255,.95)}
  body.light-mode .board{background-image:linear-gradient(rgba(157,123,234,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(157,123,234,.04) 1px,transparent 1px)}
  body.light-mode .card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
  body.light-mode .card.drag-clone{box-shadow:0 8px 24px rgba(0,0,0,.18)}
  body.light-mode .card-delete{background:rgba(0,0,0,.06);color:rgba(0,0,0,.4)}
  body.light-mode .color-menu{background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.12)}
  body.light-mode .toast{background:var(--accent)}
  body.light-mode .col-count{background:rgba(0,0,0,.04)}
  body.light-mode .col-delete:hover{background:#FEE2E2}

  /* ── Theme toggle ── */
  .theme-toggle{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

  /* ── Sync indicator ── */
  .sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-right:4px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
  .sync-dot.synced{background:#22c55e}
  .sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── Welcome overlay ── */
  .welcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .welcome-card{background:#fff;border-radius:16px;max-width:520px;width:100%;padding:32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .welcome-logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#9D7BEA,#7C5DC4);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;margin-bottom:16px}
  .welcome-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
  .welcome-sub{font-size:13px;color:#888;margin-bottom:28px}
  .welcome-options{display:flex;flex-direction:column;gap:10px}
  .welcome-opt{display:flex;align-items:center;gap:14px;padding:16px;border-radius:12px;border:1px solid #e5e5e5;background:#fff;cursor:pointer;transition:all .2s;text-align:left}
  .welcome-opt:hover{border-color:#9D7BEA;background:rgba(157,123,234,.04)}
  .welcome-opt.primary{border:2px solid #9D7BEA;background:rgba(157,123,234,.06)}
  .welcome-opt.primary:hover{background:rgba(157,123,234,.12)}
  .welcome-opt.disabled{opacity:.4;pointer-events:none}
  .welcome-opt-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .welcome-opt-icon.violet{background:rgba(157,123,234,.12);color:#9D7BEA}
  .welcome-opt-icon.yellow{background:rgba(234,179,8,.12);color:#ca8a04}
  .welcome-opt-icon.gray{background:rgba(0,0,0,.06);color:#888}
  .welcome-opt-text{flex:1}
  .welcome-opt-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:#1a1a1a}
  .welcome-opt-desc{font-size:11px;color:#888;margin-top:2px}
  .welcome-opt .welcome-opt-badge{font-size:9px;background:#9D7BEA;color:#fff;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.3px}

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#555}
  body.light-mode ::-webkit-scrollbar-thumb{background:#ccc}
  body.light-mode ::-webkit-scrollbar-thumb:hover{background:#aaa}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SB</div>
  <input class="project-title" id="projectTitle" value="Untitled Project" spellcheck="false">
  <div class="header-spacer"></div>
  <span style="font-size:10px;color:#9CA3AF">v17</span>
  <div class="sync-status" id="syncStatus"><span class="sync-dot" id="syncDot"></span><span id="syncLabel"></span></div>
  <button class="header-btn" onclick="newProject()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    New
  </button>
  <button class="header-btn" onclick="syncBoard()" id="syncBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    Sync
  </button>
  <button class="header-btn primary" onclick="addCardToFirstColumn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New card
  </button>
  <button class="header-btn" onclick="exportJSON()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
  <label class="header-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Import
    <input type="file" accept=".json" onchange="importJSON(event)">
  </label>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9790;</button>
</div>

<div class="board-legend" id="boardLegend" style="display:none">
  <span class="legend-group"><span class="legend-swatch" style="background:var(--yellow)"></span> INT</span>
  <span class="legend-group"><span class="legend-swatch" style="background:var(--blue)"></span> EXT</span>
  <span class="legend-group"><span class="legend-swatch" style="background:var(--green)"></span> INT/EXT</span>
  <span style="margin-left:8px;opacity:.3">|</span>
  <span class="legend-group"><span class="legend-dot" style="background:#FBBF24"></span> Jour</span>
  <span class="legend-group"><span class="legend-dot" style="background:#3B82F6"></span> Nuit</span>
  <span class="legend-group"><span class="legend-dot" style="background:#F97316"></span> Soir</span>
  <span class="legend-group"><span class="legend-dot" style="background:#93C5FD"></span> Matin</span>
  <span class="legend-group"><span class="legend-dot" style="background:#FDA4AF"></span> Aube</span>
</div>
<div class="board" id="board"></div>
<div class="toast" id="toast"></div>

<div class="welcome-overlay" id="welcomeOverlay" style="display:none">
  <div class="welcome-card">
    <div class="welcome-logo">SB</div>
    <div class="welcome-title">Scene Board</div>
    <div class="welcome-sub">Organize your screenplay visually</div>
    <div class="welcome-options">
      <div class="welcome-opt primary" id="welcome-import" onclick="welcomeChoice('import')">
        <div class="welcome-opt-icon violet">&#8645;</div>
        <div class="welcome-opt-text">
          <div class="welcome-opt-title">Import my script</div>
          <div class="welcome-opt-desc">Sync scenes from your Google Doc</div>
        </div>
        <span class="welcome-opt-badge">RECOMMENDED</span>
      </div>
      <div class="welcome-opt" onclick="welcomeChoice('demo')">
        <div class="welcome-opt-icon yellow">&#9733;</div>
        <div class="welcome-opt-text">
          <div class="welcome-opt-title">See Pulp Fiction demo</div>
          <div class="welcome-opt-desc">Explore a full breakdown of Tarantino's classic</div>
        </div>
      </div>
      <div class="welcome-opt" onclick="welcomeChoice('empty')">
        <div class="welcome-opt-icon gray">&#43;</div>
        <div class="welcome-opt-text">
          <div class="welcome-opt-title">Start blank</div>
          <div class="welcome-opt-desc">Empty board with Act 1, 2A, 2B, 3</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = {yellow:'#FFF9DB',pink:'#FFE4E8',blue:'#DBEAFE',green:'#DCFCE7',purple:'#EDE9FE',orange:'#FFEDD5',white:'#FFFFFF',gray:'#F3F4F6'};
const SWATCH_COLORS = {yellow:'#E8D44D',pink:'#E8707E',blue:'#60A5FA',green:'#4ADE80',purple:'#A78BFA',orange:'#FB923C',white:'#D4D4D4',gray:'#9CA3AF'};
let STORAGE_KEY = 'kanban_data';
let state = {title:'Untitled Project',columns:[]};

// ── Persistence ──
function save(){
  state.title = document.getElementById('projectTitle').value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ state = JSON.parse(raw); }catch(e){ console.error(e); }
  }
}

// ── Theme ──
function initTheme(){
  const saved = localStorage.getItem('kanban_theme');
  if(saved === 'dark') applyTheme('dark');
  else applyTheme('light');
}
function toggleTheme(){
  const isLight = document.body.classList.contains('light-mode');
  applyTheme(isLight ? 'dark' : 'light');
}
function applyTheme(theme){
  if(theme === 'light'){
    document.body.classList.add('light-mode');
    document.getElementById('themeToggle').innerHTML = '&#9728;';
  } else {
    document.body.classList.remove('light-mode');
    document.getElementById('themeToggle').innerHTML = '&#9790;';
  }
  localStorage.setItem('kanban_theme', theme);
}

// ── Init ──
let _pendingScenes = null;

async function init(){
  initTheme();
  const params = new URLSearchParams(location.search);

  // Use docId-specific localStorage key
  const docId = params.get('docId');
  if(docId) STORAGE_KEY = 'kanban_' + docId;

  // Check for scenes in URL (legacy)
  if(params.has('scenes')){
    try{ _pendingScenes = JSON.parse(decodeURIComponent(params.get('scenes'))); }catch(e){}
  }

  // Check for scenes via sync API (avoids URL length limits)
  if(!_pendingScenes && params.has('sync')){
    try{
      const r = await fetch(SYNC_API + encodeURIComponent(params.get('sync')));
      if(r.ok){
        const data = await r.json();
        if(data.scenes && data.scenes.length) _pendingScenes = data.scenes;
        if(data.title) document.getElementById('projectTitle').value = data.title;
      }
    }catch(e){}
    // Clean URL but keep docId
    history.replaceState({}, '', location.pathname + (docId ? '?docId=' + encodeURIComponent(docId) : ''));
  }

  // If coming from sidebar with fresh scenes, import them directly
  if(_pendingScenes && _pendingScenes.length){
    const syncTitle = document.getElementById('projectTitle').value;
    importScenes(_pendingScenes);
    if(syncTitle) state.title = syncTitle;
    document.getElementById('projectTitle').value = state.title;
    save();
    render();
    _pendingScenes = null;
    return;
  }

  // Otherwise load saved data
  load();
  if(state.columns.length){
    document.getElementById('projectTitle').value = state.title;
    render();
    return;
  }

  // First visit: show welcome overlay
  const overlay = document.getElementById('welcomeOverlay');
  overlay.style.display = 'flex';

  // Disable import option if no scenes available
  if(!_pendingScenes || !_pendingScenes.length){
    const importOpt = document.getElementById('welcome-import');
    importOpt.classList.add('disabled');
    importOpt.querySelector('.welcome-opt-desc').textContent = 'Open Scene Board from the sidebar to import';

function parseHeading(heading){
  const h = (heading||'').trim();
  // Extract type (INT, EXT, INT/EXT)
  let type = '';
  const tm = h.match(/^(INT\/EXT|I\/E|INT|EXT)[.\s/]*\s*/i);
  if(tm) type = tm[1].toUpperCase().replace('I/E','INT/EXT');
  // Remove type prefix
  let rest = tm ? h.slice(tm[0].length) : h;
  // Extract time of day after last dash (handles " - ", " – ", " — ")
  let time = 'unknown';
  const dashMatch = rest.match(/\s+[-–—]\s+([^-–—]+)$/);
  let location = rest;
  if(dashMatch){
    const after = dashMatch[1].trim().toUpperCase();
    if(/\bNUIT\b|\bNIGHT\b/.test(after)) time = 'nuit';
    else if(/\bSOIR\b|\bEVENING\b/.test(after)) time = 'soir';
    else if(/\bMATIN\b|\bMORNING\b/.test(after)) time = 'matin';
    else if(/\bAUBE\b|\bDAWN\b/.test(after)) time = 'aube';
    else if(/\bJOUR\b|\bDAY\b/.test(after)) time = 'jour';
    if(time !== 'unknown') location = rest.slice(0, rest.length - dashMatch[0].length).trim();
  }
  // Also check whole heading for time keywords if not found after dash
  if(time === 'unknown'){
    const u = rest.toUpperCase();
    if(/\bNUIT\b|\bNIGHT\b/.test(u)) time = 'nuit';
    else if(/\bSOIR\b|\bEVENING\b/.test(u)) time = 'soir';
    else if(/\bMATIN\b|\bMORNING\b/.test(u)) time = 'matin';
    else if(/\bAUBE\b|\bDAWN\b/.test(u)) time = 'aube';
    else if(/\bJOUR\b|\bDAY\b/.test(u)) time = 'jour';
  }
  // Clean location: remove trailing dots/dashes and time keywords
  location = location.replace(/\s*[-–—]\s*(JOUR|NUIT|SOIR|MATIN|AUBE|DAY|NIGHT|EVENING|MORNING|DAWN)\s*$/i,'');
  location = location.replace(/^[.\s-–—]+|[.\s-–—]+$/g,'').trim();
  return {type, location, time};
}

function makeFallbackSummary(body){
  if(!body) return '…';
  return '…';
}

// Fetch AI summaries and update cards
function fetchAISummaries(scenes){
  const API='https://screenplay-editor-api.hugopthomas.workers.dev';
  fetch(API+'/board/summarize',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({scenes:scenes})
  }).then(r=>r.json()).then(data=>{
    if((!data.short||!data.short.length)&&(!data.long||!data.long.length)) return;
    state.columns.forEach(col=>{
      col.cards.forEach(card=>{
        const idx = card._sceneIdx;
        if(typeof idx !== 'number') return;
        if(data.short && data.short[idx]) card.text = data.short[idx];
        if(data.long && data.long[idx]) card.body = data.long[idx];
      });
    });
    save(); render();
  }).catch(()=>{});
}

function importScenes(scenes){
  state.title = 'Imported Scenes';
  state.columns = [
    {id:uid(),title:'Act 1',cards:[]},
    {id:uid(),title:'Act 2A',cards:[]},
    {id:uid(),title:'Act 2B',cards:[]},
    {id:uid(),title:'Act 3',cards:[]},
  ];
  const typeColors = {INT:'yellow',EXT:'blue','INT/EXT':'green'};
  scenes.forEach((s,i)=>{
    const colIdx = Math.min(Math.floor(i / Math.ceil(scenes.length / 4)), 3);
    const heading = s.heading || s.text || (typeof s === 'string' ? s : '');
    const parsed = parseHeading(heading);
    const color = parsed.type ? (typeColors[parsed.type] || 'purple') : (s.color || 'yellow');
    const summary = s.summary || makeFallbackSummary(s.body);
    const body = s.body ? s.body.slice(0, 240) : '';
    state.columns[colIdx].cards.push({
      id:uid(),
      text: summary || heading,
      location: parsed.location,
      type: parsed.type,
      time: parsed.time,
      body: body,
      _rawHeading: heading,
      color: color,
      _sceneIdx: i
    });
  });
  const legend = document.getElementById('boardLegend');
  if(legend) legend.style.display = '';
  // Fetch AI summaries asynchronously
  fetchAISummaries(scenes);
}

// ── UID ──
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

// ── Render ──
function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  state.columns.forEach((col)=>{
    board.appendChild(createColumnEl(col));
  });
  // Add-column button
  const addCol = document.createElement('div');
  addCol.className = 'add-column';
  addCol.innerHTML = '<button class="add-col-btn" onclick="addColumn()">+ Add column</button>';
  board.appendChild(addCol);
}

function createColumnEl(col){
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;

  // Header
  const header = document.createElement('div');
  header.className = 'col-header';
  const title = document.createElement('input');
  title.className = 'col-title';
  title.value = col.title;
  title.readOnly = true;
  title.spellcheck = false;
  title.addEventListener('dblclick', ()=>{ title.readOnly = false; title.focus(); title.select(); });
  title.addEventListener('blur', ()=>{ title.readOnly = true; col.title = title.value; save(); });
  title.addEventListener('keydown', e=>{ if(e.key==='Enter'){title.blur();} });
  const count = document.createElement('span');
  count.className = 'col-count';
  count.textContent = col.cards.length;
  const del = document.createElement('button');
  del.className = 'col-delete';
  del.innerHTML = '&times;';
  del.title = 'Delete column';
  del.onclick = ()=>{
    if(col.cards.length && !confirm('Delete column "'+col.title+'" and its '+col.cards.length+' cards?')) return;
    state.columns = state.columns.filter(c=>c.id!==col.id);
    save(); render();
  };
  header.append(title, count, del);

  // Cards container
  const cards = document.createElement('div');
  cards.className = 'col-cards';
  cards.dataset.colId = col.id;
  col.cards.forEach(card=>{ cards.appendChild(createCardEl(card, col)); });

  // Drop zone events
  cards.addEventListener('dragover', handleDragOver);
  cards.addEventListener('dragleave', handleDragLeave);
  cards.addEventListener('drop', handleDrop);

  // Add card button
  const addDiv = document.createElement('div');
  addDiv.className = 'col-add';
  const addBtn = document.createElement('button');
  addBtn.className = 'col-add-btn';
  addBtn.textContent = '+ Add a card';
  addBtn.onclick = ()=> addCard(col.id);
  addDiv.appendChild(addBtn);

  el.append(header, cards, addDiv);
  return el;
}

function createCardEl(card, col){
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardId = card.id;
  el.dataset.colId = col.id;
  el.style.background = COLORS[card.color] || COLORS.yellow;

  // Drag handle — only this part is draggable
  const grip = document.createElement('div');
  grip.className = 'card-grip';
  grip.draggable = true;
  grip.innerHTML = '⠿';
  grip.addEventListener('dragstart', (e)=>{
    e.dataTransfer.effectAllowed = 'move';
    // Patch currentTarget to point to card element
    Object.defineProperty(e, 'currentTarget', {get:()=>el});
    handleDragStart(e);
  });
  grip.addEventListener('dragend', (e)=>{
    Object.defineProperty(e, 'currentTarget', {get:()=>el});
    handleDragEnd(e);
  });
  el.appendChild(grip);

  // Time dot (always visible — grey if unknown)
  const dot = document.createElement('span');
  const t = card.time || 'unknown';
  dot.className = 'time-dot ' + t;
  dot.title = t === 'unknown' ? 'Non spécifié' : t.charAt(0).toUpperCase() + t.slice(1);
  el.appendChild(dot);

  // Location line
  if(card.location){
    const loc = document.createElement('div');
    loc.className = 'card-location';
    loc.textContent = card.location;
    el.appendChild(loc);
  }

  // Summary (1-line, replaces heading as main text)
  const text = document.createElement('div');
  text.className = 'card-text';
  text.textContent = card.text;
  el.appendChild(text);

  // Expandable body — checkbox hack (pure CSS, no JS)
  const bodyText = card.body || card._rawHeading || '';
  if(bodyText){
    const cbId = 'cb_' + card.id;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'card-toggle';
    cb.id = cbId;
    el.appendChild(cb);
    const lbl = document.createElement('label');
    lbl.className = 'card-expand-label';
    lbl.htmlFor = cbId;
    lbl.textContent = 'détails';
    el.appendChild(lbl);
    const bodyEl = document.createElement('div');
    bodyEl.className = 'card-body';
    bodyEl.textContent = bodyText;
    el.appendChild(bodyEl);
  }

  const del = document.createElement('button');
  del.className = 'card-delete';
  del.innerHTML = '&times;';
  del.onclick = (e)=>{
    e.stopPropagation();
    col.cards = col.cards.filter(c=>c.id!==card.id);
    save(); render();
  };
  el.appendChild(del);

  // Double-click to edit
  el.addEventListener('dblclick', ()=> startEditCard(el, card));

  // Right-click for color
  el.addEventListener('contextmenu', (e)=>{
    e.preventDefault();
    showColorMenu(e, card);
  });

  return el;
}

// ── Card editing ──
function startEditCard(el, card){
  el.draggable = false;
  const textEl = el.querySelector('.card-text');
  textEl.contentEditable = true;
  textEl.style.pointerEvents = 'auto';
  // Place cursor at end
  const range = document.createRange();
  range.selectNodeContents(textEl);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  textEl.focus();
  const finish = ()=>{
    textEl.contentEditable = false;
    el.draggable = true;
    textEl.style.pointerEvents = '';
    card.text = textEl.textContent;
    save();
  };
  textEl.addEventListener('blur', finish, {once:true});
  textEl.addEventListener('keydown', (e)=>{
    if(e.key==='Escape'||(!e.shiftKey&&e.key==='Enter')){ e.preventDefault(); textEl.blur(); }
  });
}

// ── Drag & Drop ──
let dragData = null;
let dragClone = null;

function handleDragStart(e){
  const el = e.currentTarget;
  dragData = {cardId:el.dataset.cardId, colId:el.dataset.colId};
  el.classList.add('dragging');
  // Create visual clone
  dragClone = el.cloneNode(true);
  dragClone.classList.remove('dragging');
  dragClone.classList.add('drag-clone');
  dragClone.style.width = el.offsetWidth+'px';
  document.body.appendChild(dragClone);
  // Use transparent drag image
  const blank = document.createElement('canvas');
  blank.width = 1; blank.height = 1;
  e.dataTransfer.setDragImage(blank, 0, 0);
  e.dataTransfer.effectAllowed = 'move';
  // Track mouse for clone
  document.addEventListener('dragover', moveClone);
}

function moveClone(e){
  if(!dragClone) return;
  dragClone.style.left = (e.clientX - dragClone.offsetWidth/2)+'px';
  dragClone.style.top = (e.clientY - 20)+'px';
}

function handleDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.addEventListener('dragover', moveClone);
  if(dragClone){ dragClone.remove(); dragClone = null; }
  removePlaceholders();
  dragData = null;
}

function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if(!dragData) return;
  const container = e.currentTarget;
  removePlaceholders();
  const placeholder = document.createElement('div');
  placeholder.className = 'drop-placeholder';
  const afterEl = getDragAfterElement(container, e.clientY);
  if(!afterEl){
    container.appendChild(placeholder);
  } else {
    container.insertBefore(placeholder, afterEl);
  }
}

function handleDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    removePlaceholders();
  }
}

function handleDrop(e){
  e.preventDefault();
  if(!dragData) return;
  const targetColId = e.currentTarget.dataset.colId;
  const {cardId, colId: sourceColId} = dragData;

  // Find source
  const srcCol = state.columns.find(c=>c.id===sourceColId);
  const cardIdx = srcCol.cards.findIndex(c=>c.id===cardId);
  if(cardIdx===-1) return;
  const [card] = srcCol.cards.splice(cardIdx, 1);

  // Find insert position
  const targetCol = state.columns.find(c=>c.id===targetColId);
  const afterEl = getDragAfterElement(e.currentTarget, e.clientY);
  if(!afterEl){
    targetCol.cards.push(card);
  } else {
    const afterIdx = targetCol.cards.findIndex(c=>c.id===afterEl.dataset.cardId);
    if(afterIdx===-1) targetCol.cards.push(card);
    else targetCol.cards.splice(afterIdx, 0, card);
  }

  removePlaceholders();
  dragData = null;
  if(dragClone){ dragClone.remove(); dragClone = null; }
  save();
  render();
}

function getDragAfterElement(container, y){
  const cards = [...container.querySelectorAll('.card:not(.dragging)')];
  let closest = {offset:Number.POSITIVE_INFINITY, element:null};
  cards.forEach(child=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset<0 && offset>-closest.offset*1){
      // We want the first element whose midpoint is below y
    }
    if(offset<0 && Math.abs(offset)<closest.offset){
      closest = {offset:Math.abs(offset), element:child};
    }
  });
  return closest.element;
}

function removePlaceholders(){
  document.querySelectorAll('.drop-placeholder').forEach(p=>p.remove());
}

// ── Color Menu ──
let colorMenuEl = null;
function showColorMenu(e, card){
  closeColorMenu();
  const menu = document.createElement('div');
  menu.className = 'color-menu';
  Object.entries(COLORS).forEach(([name, hex])=>{
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (card.color===name?' active':'');
    swatch.style.background = SWATCH_COLORS[name] || hex;
    swatch.title = name;
    swatch.onclick = ()=>{
      card.color = name;
      save(); render();
      closeColorMenu();
    };
    menu.appendChild(swatch);
  });
  menu.style.left = Math.min(e.clientX, window.innerWidth - 160)+'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 100)+'px';
  document.body.appendChild(menu);
  colorMenuEl = menu;
  setTimeout(()=> document.addEventListener('click', closeColorMenu, {once:true}), 0);
}
function closeColorMenu(){
  if(colorMenuEl){ colorMenuEl.remove(); colorMenuEl=null; }
}

// ── Actions ──
function addCard(colId){
  const col = state.columns.find(c=>c.id===colId);
  if(!col) return;
  const card = {id:uid(), text:'', color:'yellow'};
  col.cards.push(card);
  save(); render();
  // Focus the new card for editing
  const cardEl = document.querySelector(`[data-card-id="${card.id}"]`);
  if(cardEl) startEditCard(cardEl, card);
}

function addCardToFirstColumn(){
  if(!state.columns.length) return;
  addCard(state.columns[0].id);
}

function addColumn(){
  state.columns.push({id:uid(), title:'New Column', cards:[]});
  save(); render();
  // Focus the new column title
  const cols = document.querySelectorAll('.col-title');
  const last = cols[cols.length-1];
  if(last){ last.readOnly=false; last.focus(); last.select(); }
}

// ── Sync ──
const SYNC_API = 'https://screenplay-editor-api.hugopthomas.workers.dev/board/sync/';

function getSyncId(){
  let id = localStorage.getItem('kanban_sync_id');
  if(!id){
    id = uid()+uid();
    localStorage.setItem('kanban_sync_id', id);
  }
  return id;
}

async function syncBoard(){
  const syncId = getSyncId();
  updateSyncStatus('syncing');
  try{
    // Try to load remote first
    const res = await fetch(SYNC_API + syncId);
    if(res.ok){
      const remote = await res.json();
      // If remote exists and is newer or local is fresh demo, ask
      const useRemote = confirm('A synced version exists in the cloud.\n\nOK = Load from cloud\nCancel = Overwrite cloud with current board');
      if(useRemote){
        state = remote;
        save();
        document.getElementById('projectTitle').value = state.title;
        render();
        updateSyncStatus('synced');
        toast('Loaded from cloud');
        return;
      }
    }
    // Save to cloud
    save();
    await fetch(SYNC_API + syncId, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(state)
    });
    updateSyncStatus('synced');
    toast('Synced to cloud');
  }catch(e){
    console.error('Sync error', e);
    updateSyncStatus('error');
    toast('Sync failed');
  }
}

function updateSyncStatus(status){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot';
  if(status==='synced'){ dot.classList.add('synced'); label.textContent='synced'; }
  else if(status==='syncing'){ dot.classList.add('syncing'); label.textContent='syncing...'; }
  else if(status==='error'){ label.textContent='error'; }
  else { label.textContent=''; }
}

// ── Export / Import ──
function exportJSON(){
  save();
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.title||'kanban')+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported!');
}

function importJSON(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!data.columns) throw new Error('Invalid format');
      state = data;
      save();
      document.getElementById('projectTitle').value = state.title||'Untitled';
      render();
      toast('Imported!');
    }catch(err){ toast('Invalid JSON file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Toast ──
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
